<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felix5 Store - Curated Sneaker Resale | Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #F2EFE7 0%, #FAF8F4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 800px;
            width: 100%;
        }

        .logo-wrapper {
            margin-bottom: 50px;
            animation: fadeInDown 1s ease-out;
        }

        .logo {
            max-width: 200px;
            height: auto;
            display: inline-block;
            margin-bottom: 30px;
        }

        .logo img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(139, 0, 74, 0.1));
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: #8B004A;
            margin-bottom: 15px;
            letter-spacing: -1px;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .tagline {
            font-size: 1.1rem;
            color: #8B004A;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .coming-soon-text {
            font-size: 2rem;
            color: #8B004A;
            margin: 50px 0;
            font-weight: 600;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .description {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.8;
            margin-bottom: 50px;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .cta-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeInUp 1s ease-out 1s both;
        }

        .email-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .email-input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #8B004A;
            background: white;
            font-size: 1rem;
            color: #333;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .email-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(139, 0, 74, 0.1);
            background: #fff;
        }

        .email-input::placeholder {
            color: #999;
        }

        .notify-btn {
            padding: 14px 40px;
            background: #8B004A;
            color: white;
            border: 2px solid #8B004A;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .notify-btn:hover {
            background: #6a0038;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 0, 74, 0.2);
        }

        .notify-btn:active {
            transform: translateY(0);
        }

        .socials {
            margin-top: 50px;
            animation: fadeInUp 1s ease-out 1.2s both;
        }

        .social-text {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-link {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #8B004A;
            border-radius: 50%;
            color: #8B004A;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: #8B004A;
            color: white;
            transform: translateY(-3px);
        }

        .divider {
            width: 80px;
            height: 2px;
            background: #8B004A;
            margin: 40px auto;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .success-message {
            display: none;
            color: #8B004A;
            font-size: 1rem;
            margin-top: 15px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .coming-soon-text {
                font-size: 1.5rem;
            }

            .email-container {
                flex-direction: column;
            }

            .notify-btn {
                width: 100%;
            }

            .description {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <div class="logo">
                <svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
                    <!-- Shoe Icon -->
                    <path d="M520 180 Q580 160 640 175 L660 220 Q650 250 620 260 L530 255 Q510 240 520 180" fill="none" stroke="#8B004A" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M490 220 Q510 210 540 215 L620 225 Q630 235 610 250 L520 245 Q500 235 490 220" fill="#8B004A" opacity="0.3"/>
                    
                    <!-- Number 5 -->
                    <g>
                        <circle cx="680" cy="220" r="35" fill="none" stroke="#8B004A" stroke-width="18" stroke-linecap="round"/>
                        <path d="M660 210 L700 210" stroke="#8B004A" stroke-width="18" stroke-linecap="round"/>
                    </g>
                </svg>
            </div>
        </div>

        <h1>Felix5</h1>
        <p class="tagline">Curated Sneaker Resale</p>

        <div class="divider"></div>

        <div class="coming-soon-text">
            🚀 Launching Soon
        </div>

        <p class="description">
            Get ready for the finest curated sneaker collection. 
            We're crafting an exclusive marketplace where authenticity meets passion.
        </p>

        <div class="cta-section">
            <form id="notifyForm" onsubmit="handleSubmit(event)">
                <div class="email-container">
                    <input 
                        type="email" 
                        class="email-input" 
                        placeholder="Enter your email"
                        name="email"
                        id="emailInput"
                        required
                    >
                    <button type="submit" class="notify-btn">Notify Me</button>
                </div>
                <div class="success-message" id="successMessage">
                    ✓ Thanks! We'll notify you when we launch.
                </div>
            </form>
        </div>

        <div class="socials">
            <p class="social-text">Follow Us</p>
            <div class="social-links">
                <a href="https://www.instagram.com/felix5.store?igsh=MXRxbWpicXRyZGw1ZA%3D%3D&utm_source=qr" class="social-link" title="Instagram" target="_blank">📷</a>
            </div>
            <p style="margin-top: 30px; font-size: 0.95rem; color: #666;">
                Questions? Reach us at <a href="mailto:carnageyt90@gmail.com" style="color: #8B004A; text-decoration: none; font-weight: 600; transition: all 0.3s ease;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">carnageyt90@gmail.com</a>
            </p>
        </div>
    </div>

    <script>
        async function handleSubmit(event) {
            event.preventDefault();
            
            const emailInput = document.getElementById('emailInput');
            const successMessage = document.getElementById('successMessage');
            const notifyForm = document.getElementById('notifyForm');
            
            const userEmail = emailInput.value.trim();
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!userEmail) {
                alert('Please enter your email address');
                return;
            }
            
            if (!emailRegex.test(userEmail)) {
                alert('Please enter a valid email address');
                return;
            }
            
            try {
                // Send to Formspree service
                const response = await fetch('https://formspree.io/f/mqevqjrj', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: userEmail,
                        message: `New notification signup: ${userEmail}`,
                        _to: 'flex591sdkm@gmail.com'
                    })
                });
                
                if (response.ok) {
                    // Show success message
                    successMessage.style.display = 'block';
                    emailInput.value = '';
                    
                    // Hide message after 5 seconds
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 5000);
                    
                    console.log('Email submitted:', userEmail);
                } else {
                    alert('There was an error. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Unable to submit. Please try again.');
            }
        }

        // Allow Enter key to submit
        document.getElementById('emailInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('notifyForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
